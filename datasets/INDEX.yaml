# INDEX.yaml — Central index of Telemachus Open datasets
# Updated: 2026-04-16
#
# Each open dataset has a parquet file (when license allows redistribution)
# alongside its manifest.yaml, README.md, and SHA256SUMS.
---

open_datasets:

  aegis:
    title: "AEGIS Automotive Sensor Data (Graz, Austria)"
    dir: aegis/
    parquet: aegis/aegis-telemachus.parquet
    manifest: aegis/manifest.yaml
    zenodo_doi: "10.5281/zenodo.19609044"
    source_doi: "10.5281/zenodo.820576"
    license: CC-BY-4.0
    raw_data: "/datas/AEGIS/"
    rows: 1063350
    trips: 33
    hardware: BeagleBone research platform
    sensors: GPS 5Hz, Accel 24Hz, Gyro 24Hz, OBD
    used_by: [P013, P019, P020]

  stride:
    title: "STRIDE Road Quality Data (Rajshahi, Bangladesh)"
    dir: stride/
    parquet: stride/stride-telemachus.parquet
    manifest: stride/manifest.yaml
    zenodo_doi: "10.5281/zenodo.19609053"
    source_doi: "10.6084/m9.figshare.25460755"
    license: CC-BY-4.0
    raw_data: "/datas/Bangladesh/Road Data/"
    rows: 340900
    trips: 23
    hardware: Xiaomi POCO X2 smartphone
    sensors: GPS 1Hz, Accel 100Hz, Gyro 100Hz, Magneto 100Hz
    used_by: [P019]

  rs3:
    title: "RoadSimulator3 Synthetic Dataset (Le Havre, France)"
    dir: rs3/
    parquet: rs3/rs3-telemachus.parquet
    manifest: rs3/manifest.yaml
    zenodo_doi: "10.5281/zenodo.19609057"
    license: CC0-1.0
    raw_data: null  # synthetic, generated by RS3
    rows: 131186
    trips: 1
    hardware: Simulated (RoadSimulator3)
    sensors: GPS 1Hz, IMU 10Hz
    used_by: []

  pvs:
    title: "PVS Passive Vehicular Sensors (Curitiba, Brazil)"
    dir: pvs/
    parquet: pvs/pvs-telemachus-dashboard-left.parquet  # local only, NOT on Zenodo
    manifest: pvs/manifest.yaml
    zenodo_doi: null  # CC-BY-NC-ND — cannot redistribute
    source_url: "https://www.kaggle.com/datasets/jefmenegazzo/pvs-passive-vehicular-sensors-datasets"
    license: CC-BY-NC-ND-4.0
    raw_data: "/datas/PVS/"
    rows: 1080905
    trips: 9
    hardware: InvenSense MPU-9250
    sensors: GPS 1Hz, Accel 100Hz, Gyro 100Hz, Magneto 100Hz
    used_by: [P019]
    note: "Non-redistributable. See pvs/README.md for reproduction instructions."

spec:
  doi: "10.5281/zenodo.19609019"
  concept_doi: "10.5281/zenodo.17228091"
  version: "0.8"
